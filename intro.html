<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menchmark — Run your classroom like a mensch</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { theme: { extend: {
  colors: { navy:{900:'#0a1424',800:'#0f1b33',700:'#16264a',600:'#1a2d4d'}, gold:{400:'#e8b321',300:'#f0c65e'}, stress:'#e14b3c' },
  fontFamily: { display:['"DM Serif Display"','serif'], sans:['Inter','system-ui','sans-serif'] }
}}}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Flip.min.js"></script>
<style>
  html,body{background:#0a1424;overflow-x:hidden}
  #pin{height:100vh;position:relative;overflow:hidden}
  .layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
  /* --- HERO TEXT LAYER --- */
  #brand{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,4.5rem);letter-spacing:.02em;color:#f4f1ea;line-height:1;margin-bottom:1.4rem}
  #brand .mk{color:#e8b321}
  #tagline{font-family:'DM Serif Display',serif;font-size:clamp(1.6rem,5vw,3.4rem);color:#cdd6e6;line-height:1.15;text-align:center;display:flex;flex-wrap:wrap;justify-content:center;align-items:baseline}
  #tagline .w{display:inline-flex;align-items:baseline;white-space:nowrap;margin:0 .28em}
  .sInline{display:inline-block;position:relative;color:#cdd6e6}
  /* --- FLYING S (starts matching tagline s) --- */
  #sFly{position:fixed;font-family:'DM Serif Display',serif;font-size:clamp(2rem,9vw,6rem);color:#cdd6e6;opacity:0;z-index:30;line-height:1;transform-origin:center center;left:0;top:0}
  /* --- STRESS as a FIXED centered unit; its leading S is a hidden placeholder --- */
  #stressRow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:baseline;opacity:0;z-index:20}
  #stressRow .ltr{font-family:'DM Serif Display',serif;font-size:clamp(2rem,9vw,6rem);color:#e14b3c;line-height:1;display:inline-block}
  #stressRow #xS{visibility:hidden} /* placeholder slot; the flying S lands here */
  /* --- SCANNER --- */
  #svgWrap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(46vw,320px);height:min(46vw,320px);opacity:0;z-index:25}
  #svgWrap svg{width:100%;height:100%;overflow:visible}
  .scan-line{stroke:#f4f1ea;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
  #qrTarget{opacity:0}
  #qrTarget rect{fill:#f4f1ea}
  #scanRay{stroke:#e8b321;stroke-width:3;opacity:0;filter:drop-shadow(0 0 6px #e8b321)}
  #beam{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:26}
  #beamBar{position:absolute;top:0;bottom:0;left:0;width:6px;background:linear-gradient(90deg,transparent,#e8b321,#fff8e0,#e8b321,transparent);filter:blur(1px);box-shadow:0 0 40px 8px rgba(232,179,33,.55);transform:translateX(-100vw)}
  #payoff{position:absolute;bottom:12vh;left:0;right:0;text-align:center;font-family:'DM Serif Display',serif;font-size:clamp(1.3rem,3.2vw,2.2rem);color:#f4f1ea;opacity:0;padding:0 1rem;z-index:28}
  #payoff .accent{color:#e8b321}
  .indicator{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);color:#5a6a8a;font-family:Inter,sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;display:flex;align-items:center;gap:8px;transition:opacity .4s;z-index:40}
  .indicator svg{width:14px;height:14px;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  @media (prefers-reduced-motion: reduce){ .indicator svg{animation:none} }
  @media (max-width: 640px){
    #tagline{font-size:clamp(1.3rem,6.5vw,2rem);gap:.1em}
    #tagline .w{margin:0 .18em}
    /* push the mensch word onto its own line so the dropping s is easy to track */
    #menschWord{flex-basis:100%;justify-content:center;margin-top:.2em}
    #stressRow .ltr{font-size:clamp(2.2rem,11vw,4rem)}
    #sFly{font-size:clamp(2.2rem,11vw,4rem)}
  }
</style>
</head>
<body>

<div id="pinSpacer" style="height:680vh;position:relative">
  <div id="pin">
    <!-- hero text -->
    <div class="layer" id="heroLayer">
      <div id="brand">Mench<span class="mk">mark</span></div>
      <div id="tagline">
        <span class="w">Run</span><span class="w">your</span><span class="w">classroom</span><span class="w">like</span><span class="w">a</span><span class="w" id="menschWord"><span id="menPart">men</span><span class="sInline" id="lS">s</span><span id="chPart">ch.</span></span>
      </div>
    </div>

    <!-- flying S -->
    <span id="sFly">s</span>

    <!-- STRESS fixed unit -->
    <div id="stressRow">
      <span class="ltr" id="xS">S</span><span class="ltr" id="xT">T</span><span class="ltr" id="xR">R</span><span class="ltr" id="xE">E</span><span class="ltr" id="xS2">S</span><span class="ltr" id="xS3">S</span>
    </div>

    <!-- scanner -->
    <div id="svgWrap">
      <svg viewBox="0 0 200 200" fill="none">
        <!-- QR code the scanner reads (to the lower-right of the beam) -->
        <g id="qrTarget">
          <rect x="76" y="-66" width="11" height="11" fill="none" stroke="#f4f1ea" stroke-width="2"/>
          <rect x="79" y="-63" width="5" height="5"/>
          <rect x="95" y="-66" width="11" height="11" fill="none" stroke="#f4f1ea" stroke-width="2"/>
          <rect x="98" y="-63" width="5" height="5"/>
          <rect x="76" y="-47" width="11" height="11" fill="none" stroke="#f4f1ea" stroke-width="2"/>
          <rect x="79" y="-44" width="5" height="5"/>
          <rect x="90" y="-64" width="3" height="3"/><rect x="90" y="-58" width="3" height="3"/>
          <rect x="95" y="-49" width="3" height="3"/><rect x="101" y="-49" width="3" height="3"/>
          <rect x="95" y="-43" width="3" height="3"/><rect x="90" y="-51" width="3" height="3"/>
        </g>

        <!-- Tera 1300 pocket scanner: rounded pebble body, taller than wide, slight taper -->
        <!-- p1: outer body outline -->
        <path class="scan-line" id="p1" d="M78 24
          Q58 24 56 46
          Q53 78 55 112
          Q56 140 66 158
          Q72 168 84 168
          L96 168
          Q108 168 114 158
          Q124 140 125 112
          Q127 78 124 46
          Q122 24 102 24
          Z"/>

        <!-- p2: glossy face plate (inset panel near the top) -->
        <path class="scan-line" id="p2" d="M74 34
          Q66 34 65 46
          Q63 74 64 104
          Q64 116 76 116
          L104 116
          Q116 116 116 104
          Q117 74 115 46
          Q114 34 106 34
          Z"/>

        <!-- p3: power button (round, centered on face) -->
        <circle class="scan-line" id="p3" cx="90" cy="92" r="12"/>

        <!-- Menchmark logo mark: gold circle + white M (real brand mark), on the scanner face -->
        <g id="logoMark" style="opacity:0" transform="translate(77,39) scale(0.0508)">
          <circle cx="256" cy="256" r="256" fill="#e8b321"/>
          <g fill="#ffffff"><g transform="translate(93.96,370.44) scale(0.33172,-0.33172)"><path d="M408 -10Q374 73 340.5 155.0Q307 237 273 319Q265 338 252.5 372.5Q240 407 226.5 452.0Q213 497 202 545Q204 489 205.0 439.5Q206 390 205 345Q205 323 205.0 300.0Q205 277 204.5 254.5Q204 232 204.0 209.5Q204 187 204 164Q204 137 202.5 112.0Q201 87 199 74Q216 76 240.5 76.5Q265 77 275 77V0H47V66Q70 67 85.5 72.0Q101 77 109.5 95.0Q118 113 118 153L124 536Q125 563 126.0 588.0Q127 613 128 626Q112 625 88.0 624.5Q64 624 53 623V700H274L425 313Q434 290 445.0 259.5Q456 229 466.0 200.5Q476 172 481 155H482Q495 190 506.0 223.0Q517 256 529 287Q568 391 606.5 494.0Q645 597 684 700H915V634Q893 633 876.0 628.0Q859 623 850.5 605.5Q842 588 843 547L858 164Q860 137 858.0 112.0Q856 87 854 74Q871 76 895.5 76.5Q920 77 930 77V0H652V66Q675 67 691.5 72.0Q708 77 716.5 95.0Q725 113 723 153L715 365Q715 377 713.0 406.5Q711 436 709.5 471.5Q708 507 707 538Q704 531 701.0 524.5Q698 518 696 511L501 -10Z"/></g></g>
        </g>

        <!-- p4: scan window slit on the TOP edge (emitter) -->
        <path class="scan-line" id="p4" d="M78 26 L102 26"/>

        <!-- scan beam from bottom window down-right to the QR -->
        <!-- fanning beam of light spreading upward from the top emitter -->
        <g id="scanRay" style="opacity:0">
          <path class="beamArc" d="M74 14 Q90 2 106 14" fill="none" stroke="#fff8e0" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
          <path class="beamArc" d="M64 2 Q90 -18 116 2" fill="none" stroke="#f0c65e" stroke-width="2.2" stroke-linecap="round" opacity="0.75"/>
          <path class="beamArc" d="M54 -12 Q90 -40 126 -12" fill="none" stroke="#e8b321" stroke-width="2.0" stroke-linecap="round" opacity="0.5"/>
          <path class="beamArc" d="M44 -26 Q90 -62 136 -26" fill="none" stroke="#e8b321" stroke-width="1.8" stroke-linecap="round" opacity="0.28"/>
        </g>
      </svg>
    </div>

    <div id="beam"><div id="beamBar"></div></div>
    <div id="payoff">We took away your <span class="accent">stress</span>.<br>And replaced it with a scanner.</div>

    <div class="indicator" id="scrollHint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m0 0l-6-6m6 6l6-6"/></svg>
      Scroll
    </div>
  </div>
</div>

<section class="min-h-screen bg-[#f4f1ea] flex items-center justify-center px-6">
  <div class="max-w-xl text-center">
    <div class="font-display text-4xl sm:text-5xl text-navy-800 mb-3">Mench<span class="text-gold-400">mark</span></div>
    <p class="font-sans text-slate-500 text-lg mb-8">Run your classroom like a mensch.</p>
    <a href="index.html" class="inline-flex items-center gap-2 bg-gold-400 hover:bg-gold-300 text-navy-800 font-bold text-base rounded-xl px-8 py-4 transition-colors shadow-lg shadow-gold-400/30">
      Try Menchmark free
    </a>
    <p class="text-slate-400 text-xs font-sans mt-4">menchmark.app · free during beta</p>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger, Flip);
window.addEventListener('load', function(){
  var lS   = document.getElementById('lS');
  var sFly = document.getElementById('sFly');
  var xS   = document.getElementById('xS');
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Position the flying S so it STARTS exactly over the tagline's inline 's',
  // and can be moved to the fixed STRESS placeholder slot via absolute coords.
  // Both start and end are read fresh at the moment each is needed (via function-based
  // tween values evaluated at build time, then held — but we also re-init on resize).
  function rectCenter(el){ var r = el.getBoundingClientRect(); return { x: r.left + r.width/2, y: r.top + r.height/2, h: r.height }; }

  function initPositions(){
    var s = rectCenter(lS);
    // size the flying S to match the tagline 's' at start, placed at its center
    gsap.set(sFly, { left: s.x, top: s.y, xPercent:-50, yPercent:-50, x:0, y:0,
                     fontSize: getComputedStyle(lS).fontSize, color:'#cdd6e6', scale:1 });
  }
  initPositions();

  // draw-in prep
  ['p1','p2','p3','p4'].forEach(function(id){
    var p = document.getElementById(id); var len = p.getTotalLength();
    p.style.strokeDasharray = len; p.style.strokeDashoffset = len;
  });
  // scanRay is now a fan <g>; animate via opacity/scale, no path length needed
  gsap.set('#scanRay', { opacity:0 });
  gsap.set('.beamArc', { transformOrigin:'90px 26px', transformBox:'view-box', scale:0.15, y:40, opacity:0 });

  gsap.set(['#xT','#xR','#xE','#xS2','#xS3'], { opacity: 0, y: 26 });

  // Compute the flying-S destination: the CENTER of the hidden xS placeholder slot,
  // and the font-size it must grow to (match STRESS letters). Read live so it's correct
  // for the current viewport. We store deltas relative to the S's fixed start.
  function sDestination(){
    var start = rectCenter(lS);              // where S currently is (fixed left/top)
    var target = rectCenter(xS);             // where it must land (STRESS slot center)
    var stressFS = parseFloat(getComputedStyle(xS).fontSize);
    var startFS  = parseFloat(getComputedStyle(lS).fontSize);
    return { dx: target.x - start.x, dy: target.y - start.y, scale: stressFS/startFS };
  }

  // How far the s falls before "men"/"ch" close up behind it. Scaled to the TYPE,
  // not the viewport: a fixed viewport fraction sends the small mobile glyph ~150px
  // into empty space where it reads as orphaned rather than as a letter that just
  // fell out of the word. Proportional keeps it tethered to the line at every width.
  function dropDistance(){
    return Math.max(lS.getBoundingClientRect().height * 2.6, 78);
  }

  var tl = gsap.timeline({
    scrollTrigger: {
      trigger: '#pinSpacer', start: 'top top', end: 'bottom bottom',
      scrub: 1, pin: '#pin', invalidateOnRefresh: true,
      onUpdate: function(self){ document.getElementById('scrollHint').style.opacity = self.progress > 0.02 ? '0':'1'; }
    },
    defaults: { ease: reduced ? 'none' : 'power2.inOut' }
  });

  tl
    // PHASE 1 — inline s hands off to the flying S and turns red
    .to(sFly, { opacity: 1, duration: 0.01 }, 0.30)
    .to(lS,   { opacity: 0, duration: 0.20 }, 0.30)
    .to(sFly, { color: '#e14b3c', duration: 0.45 }, 0.35)

    // PHASE 2 — THE DROP. Straight down (x untouched), gravity-in, overshooting the
    // rest point and settling back so it lands with weight instead of stopping dead.
    // It also grows ~45% of the way to its final STRESS size on the way down: that
    // keeps the small mobile glyph (~25px tall vs ~54px on desktop) readable as it
    // falls, and takes the abruptness out of the later scale-up.
    .to(sFly, {
        y: function(){ return dropDistance() + 12; },
        scale: function(){ return 1 + (sDestination().scale - 1) * 0.45; },
        duration: 0.85, ease: 'power2.in'
      }, 0.60)
    .to(sFly, { y: function(){ return dropDistance(); }, duration: 0.22, ease: 'power2.out' }, 1.45)

    // PHASE 3 — with the s clear of the line, "men" and "ch" close the gap it left.
    // Each half travels exactly half the vacated slot width, so they meet flush —
    // no overlap, no residual gap — and the word reads "mench" on its own for a beat.
    .to('#menPart', { x: function(){ return  lS.getBoundingClientRect().width/2; }, duration: 0.60, ease:'power2.inOut' }, 1.75)
    .to('#chPart',  { x: function(){ return -lS.getBoundingClientRect().width/2; }, duration: 0.60, ease:'power2.inOut' }, 1.75)
    // (2.35 → 2.75 holds "mench" long enough to actually be read)

    // PHASE 4 — the s launches from its resting place up into the STRESS slot and
    // finishes growing to match the row's letters. The hero fades a beat later so
    // the eye follows the s rather than the disappearing word.
    .to(sFly, {
        x: function(){ return sDestination().dx; },
        y: function(){ return sDestination().dy; },
        scale: function(){ return sDestination().scale; },
        duration: 1.05, ease: 'power2.inOut'
      }, 2.75)
    .to('#heroLayer', { opacity: 0, duration: 0.65 }, 2.85)

    // reveal STRESS row; swap the flying lowercase s for the row's capital S at the landing instant
    .set('#stressRow', { opacity: 1 }, 3.80)
    .set('#xS', { visibility: 'visible' }, 3.80)
    .set('#sFly', { opacity: 0 }, 3.80)
    .to(['#xT','#xR','#xE','#xS2','#xS3'], { opacity: 1, y: 0, duration: 0.6, stagger: 0.1 }, 3.85)

    // PHASE 5 — STRESS fades out, scanner fades in and draws
    .to(['#stressRow','#sFly'], { opacity: 0, duration: 0.7 }, 5.20)
    .to('#svgWrap', { opacity: 1, duration: 0.5 }, 5.60)
    .to(['#p1','#p2','#p3','#p4'], { strokeDashoffset: 0, duration: 2.0, stagger: 0.16 }, 5.70)

    // logo M fades onto the badge once the scanner is drawn
    .to('#logoMark', { opacity: 1, duration: 0.5 }, 7.40)

    // PHASE 6 — arcs ripple OUT of the scanner, bottom-up, one after another
    .set('#scanRay', { opacity: 1 }, 7.60)
    .to('.beamArc', { y: 0, scale: 1, opacity: 1, duration: 0.8, stagger: 0.15, ease:'power2.out' }, 7.60)
    .to('#qrTarget', { opacity: 1, duration: 0.5 }, 8.40)
    .to('#qrTarget rect', { fill: '#e8b321', stroke:'#e8b321', duration: 0.4, stagger: 0.02 }, 8.70)

    // PHASE 7 — beam sweep + payoff
    .to('#beamBar', { x: '110vw', duration: 1.0, ease: 'power1.in' }, 8.90)
    .to('#payoff', { opacity: 1, y: -6, duration: 0.6 }, 9.10);

  // keep S start position correct if the window resizes before scrolling
  ScrollTrigger.addEventListener('refreshInit', initPositions);
  window.addEventListener('resize', function(){ if (tl.progress() === 0) initPositions(); });
});
</script>
</body>
</html>
